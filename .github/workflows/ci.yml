name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  AIAL_MOCK: 1

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build runtime
        run: cargo build --release
        working-directory: aial-rt

      - name: Build compiler
        run: cargo build --release
        working-directory: aial-compiler

      - name: Test
        run: cargo test
        working-directory: aial-compiler

      - name: Run examples (mock)
        shell: bash
        run: |
          for f in examples/*.aal; do
            echo "=== $f ==="
            timeout 30 cargo run -- "$f" || true
          done
        working-directory: aial-compiler
