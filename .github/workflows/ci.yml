name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  AIAL_MOCK: 1

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build runtime
        if: matrix.os != 'macos-latest'
        run: cargo build
        working-directory: aial-rt

      - name: Build compiler
        run: cargo build
        working-directory: aial-compiler

      - name: Test (unit + integration)
        if: matrix.os != 'macos-latest'
        run: cargo test
        working-directory: aial-compiler

      - name: Test (unit only)
        if: matrix.os == 'macos-latest'
        run: cargo test --lib
        working-directory: aial-compiler

      - name: Run examples (mock)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          for f in examples/*.aal; do
            echo "=== $f ==="
            timeout 30 cargo run -- "$f" || true
          done
        working-directory: aial-compiler
