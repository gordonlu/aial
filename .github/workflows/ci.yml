name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  AIAL_MOCK: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build runtime
        run: cargo build
        working-directory: aial-rt

      - name: Build compiler
        run: cargo build
        working-directory: aial-compiler

      - name: Test
        run: cargo test
        working-directory: aial-compiler

      - name: Run examples (mock)
        shell: bash
        run: |
          for f in examples/*.aal; do
            echo "=== $f ==="
            timeout 30 cargo run -- "$f" || true
          done
        working-directory: aial-compiler
